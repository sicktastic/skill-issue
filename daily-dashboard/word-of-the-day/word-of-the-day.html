<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word of the Day — Lodestar</title>
</head>
<body style="background:#f3f1ec; margin:0; padding:40px 16px; font-family: Georgia, serif;">
<div style="font-family: Georgia, serif; max-width: 480px; margin: 0 auto; text-align: center; padding: 32px 24px; background: #fafaf8; border-radius: 12px; border: 1px solid #e8e4dc;">
  <h1 style="font-size: 2.5rem; margin-bottom: 4px; color: #1a1a1a;">Lodestar</h1>
  <p style="color: #888; font-size: 1.05rem; margin-bottom: 16px;">/ˈloʊdˌstɑːr/ · LOHD-star</p>
  <p style="font-size: 1.05rem; margin: 16px 0; color: #333; line-height: 1.5;">A person or thing that serves as a guide, reference point, or source of inspiration — the fixed star by which you steer.</p>
  <button onclick="speak()" style="font-size: 1rem; padding: 10px 28px; cursor: pointer; background: #2c2c2c; color: white; border: none; border-radius: 8px; margin-top: 8px;">🔊 Hear it again</button>
  <script>
    function speak() {
      const u = new SpeechSynthesisUtterance('Lodestar');
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }
    setTimeout(speak, 800);
  </script>
</div>
</body>
</html>
